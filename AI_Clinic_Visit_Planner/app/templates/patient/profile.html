{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:20px;">Profile Settings</h2>

<div class="card" style="max-width:600px;">

    <form method="POST" action="/patient/profile">

        <!-- Name -->
        <label>Full Name</label>
        <input type="text" name="name" value="{{ user.name }}" required
               style="width:100%; padding:10px; border-radius:6px; border:none; margin-top:5px; margin-bottom:15px;">

        <!-- Age -->
        <label>Age</label>
        <input type="number" name="age" value="{{ patient.age or '' }}" min="1" max="120"
               style="width:100%; padding:10px; border-radius:6px; border:none; margin-top:5px; margin-bottom:15px;">

        <!-- Health Info -->
        <label>Health Information</label>
        <textarea name="health_info"
                  placeholder="e.g., diabetes, asthma, allergies..."
                  style="width:100%; padding:10px; border-radius:6px; border:none; margin-top:5px; margin-bottom:20px; height:100px;">{{ patient.health_info or '' }}</textarea>

        <!-- Save -->
        <button type="submit" class="btn">
            Update Profile
        </button>

    </form>

</div>

<!-- Navigation -->
<div style="margin-top:20px;">
    <a href="/patient/dashboard" class="btn">Back to Dashboard</a>
</div>

{% endblock %}
