{% extends 'base.html' %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">

    <div class="card" style="width:400px; text-align:center;">

        <h2 style="margin-bottom:10px;">Login</h2>
        <p style="color:#94a3b8; font-size:14px;">
            Access your AI Clinic Visit Planner account
        </p>

        <form method="POST" action="/login">

            <div style="margin-top:20px;">
                <input type="email" name="email" placeholder="Email"
                       required
                       style="width:100%; padding:10px; border-radius:6px; border:none; margin-bottom:15px;">
            </div>

            <div>
                <input type="password" name="password" placeholder="Password"
                       required
                       style="width:100%; padding:10px; border-radius:6px; border:none; margin-bottom:20px;">
            </div>

            <button type="submit" class="btn" style="width:100%;">
                Login
            </button>

        </form>

        <p style="margin-top:15px; font-size:14px;">
            Don't have an account?
            <a href="/register" style="color:#38bdf8;">Register</a>
        </p>

    </div>

</div>

{% endblock %}
